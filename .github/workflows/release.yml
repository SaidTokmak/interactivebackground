name: Windows release

on:
  workflow_dispatch:

concurrency:
  group: windows-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      VITE_UPDATER_ENABLED: "true"
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_UPDATER_PUBKEY: ${{ vars.TAURI_UPDATER_PUBKEY }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Validate updater signing configuration
        shell: pwsh
        run: ./.github/scripts/Test-ReleaseSecrets.ps1
      - name: Import optional Windows code-signing certificate
        if: env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: ./.github/scripts/Import-WindowsCertificate.ps1
      - name: Create release-only Tauri configuration
        shell: pwsh
        run: ./.github/scripts/Write-ReleaseConfig.ps1
      - uses: tauri-apps/tauri-action@v1
        with:
          tagName: v__VERSION__
          releaseName: interactivebackground v__VERSION__
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: --config src-tauri/tauri.release.conf.json
      - name: Generate and upload SHA-256 checksums
        shell: pwsh
        run: ./.github/scripts/Publish-Checksums.ps1
